kind = "web"
previewPath = "/"
title = "Onichan Bot"
version = "1.0.0"
id = "artifacts/onichan-bot"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[deployment]
run = "/home/runner/workspace/.pythonlibs/bin/python /home/runner/workspace/src/production_start.py"

[services.web]
name = "web"
paths = ["/"]
localPort = 5000

[services.web.development]
run = "cd /home/runner/workspace/src && PORT=5000 python bot.py"

[services.web.production]
run = "/home/runner/workspace/.pythonlibs/bin/python /home/runner/workspace/src/production_start.py"
